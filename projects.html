<!doctype html>
<html lang="en" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selected Work | VARCHAS.VIZ Studio®</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="component.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                dark: "#0D0D0D",
                light: "#F4F4F4",
              },
              accent: "#262626",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
            transitionTimingFunction: {
              expo: "cubic-bezier(0.16, 1, 0.3, 1)",
            },
          },
        },
      };
    </script>

    <style>
      body {
        background-color: #f4f4f4;
        color: #0d0d0d;
        overflow-x: hidden;
      }

      /* Lenis Smooth Scroll Setup */
      html.lenis {
        height: auto;
      }
      .lenis.lenis-smooth {
        scroll-behavior: auto;
      }
      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }
      .lenis.lenis-stopped {
        overflow: hidden;
      }

      /* Hide scrollbar for clean look */
      ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
    </style>
  </head>
  <body class="selection:bg-primary-dark selection:text-primary-light">
    <div id="universal-header-container"></div>
    <section class="pt-40 px-6 md:px-12 pb-16 max-w-[100vw]">
      <div
        class="flex flex-col md:flex-row justify-between md:items-end gap-12 gs-reveal"
      >
        <div class="w-full md:w-1/2">
          <div class="flex items-center gap-3 mb-6">
            <div class="w-2 h-2 rounded-full bg-primary-dark"></div>
            <span
              class="text-sm font-bold uppercase tracking-widest text-primary-dark/60"
              >Projects</span
            >
          </div>
          <h1
            class="text-6xl md:text-8xl font-black tracking-tighter leading-none"
          >
            Selected Work
          </h1>
        </div>
        <div class="w-full md:w-1/3 md:pb-3">
          <p
            class="text-lg md:text-xl font-light text-primary-dark/70 leading-relaxed"
          >
            A collection of spaces defined by simplicity and intention.
          </p>
        </div>
      </div>
    </section>

    <section class="px-6 md:px-12 pb-32">
      <div
        id="dynamic-projects-grid"
        class="grid grid-cols-1 md:grid-cols-12 gap-y-16 md:gap-y-32 md:gap-x-12"
      ></div>
    </section>

    <div
      class="bg-primary-dark text-white rounded-t-3xl md:rounded-t-[3rem] overflow-hidden relative z-20"
    >
      <div
        class="relative h-[60vh] md:h-[80vh] w-full overflow-hidden flex items-center justify-center border-b border-white/10"
      >
        <div
          id="parallax-cta"
          class="absolute inset-0 w-full h-[120%] -top-[10%] z-0"
        >
          <img
            src="https://images.unsplash.com/photo-1549471013-3364d7220b75?q=80&w=2070&auto=format&fit=crop"
            alt="Dark Architectural Facade"
            class="w-full h-full object-cover opacity-50"
          />
        </div>
        <div class="relative z-10 text-center px-6 flex flex-col items-center">
          <h2
            class="text-5xl md:text-7xl lg:text-8xl font-medium tracking-tight leading-[1.05] mb-6"
          >
            Ready to Elevate <br />Your Space?
          </h2>
          <p class="text-lg text-white/70 font-light mb-10">
            Let's create something memorable together
          </p>
          <a
            href="contact.html"
            class="inline-flex items-center gap-2 text-sm uppercase tracking-widest font-medium hover:text-white/70 transition-colors pb-1 border-b border-white"
          >
            Start a Project ↗
          </a>
        </div>
      </div>

      <div id="universal-footer-container"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", (event) => {
        gsap.registerPlugin(ScrollTrigger);

        // 1. Initialize Lenis Smooth Scroll
        const lenis = new Lenis({
          duration: 1.2,
          easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
          direction: "vertical",
          gestureDirection: "vertical",
          smooth: true,
          mouseMultiplier: 1,
          smoothTouch: false,
          touchMultiplier: 2,
          infinite: false,
        });

        function raf(time) {
          lenis.raf(time);
          requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // Integrate Lenis with GSAP
        lenis.on("scroll", ScrollTrigger.update);
        gsap.ticker.add((time) => {
          lenis.raf(time * 1000);
        });
        gsap.ticker.lagSmoothing(0, 0);

        // 2. Storytelling Reveal Animations (Fade Up)
        const revealElements = gsap.utils.toArray(".gs-reveal");
        revealElements.forEach((elem) => {
          gsap.fromTo(
            elem,
            { autoAlpha: 0, y: 50 },
            {
              duration: 1.2,
              autoAlpha: 1,
              y: 0,
              ease: "power3.out",
              scrollTrigger: {
                trigger: elem,
                start: "top 85%",
                toggleActions: "play none none reverse",
              },
            },
          );
        });

        // 3. Subtle Parallax for Images inside the Grid
        const images = gsap.utils.toArray(".gs-image img");
        images.forEach((img) => {
          gsap.to(img, {
            yPercent: 15,
            ease: "none",
            scrollTrigger: {
              trigger: img.parentElement,
              start: "top bottom",
              end: "bottom top",
              scrub: true,
            },
          });
        });

        // 4. Parallax CTA Banner Animation
        gsap.to("#parallax-cta", {
          yPercent: 20,
          ease: "none",
          scrollTrigger: {
            trigger: "#parallax-cta",
            start: "top bottom",
            end: "bottom top",
            scrub: true,
          },
        });

        function loadProjects() {
          // STATIC DATA: Completely local, no backend required!
          const projects = [
            {
              id: 1,
              title: "Core Apartment",
              year: "2025",
              cover_image_url:
                "https://images.unsplash.com/photo-1600210492486-724fe5c67fb0?q=80&w=2500&auto=format&fit=crop",
            },
            {
              id: 2,
              title: "Linear Workspace",
              year: "2026",
              cover_image_url:
                "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=1500&auto=format&fit=crop",
            },
            {
              id: 3,
              title: "Horizon Villa",
              year: "2024",
              cover_image_url:
                "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?q=80&w=2000&auto=format&fit=crop",
            },
            {
              id: 4,
              title: "Studio Minimal",
              year: "2023",
              cover_image_url:
                "https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=2500&auto=format&fit=crop",
            },
          ];
          const grid = document.getElementById("dynamic-projects-grid");
          grid.innerHTML = "";

          const layouts = [
            {
              wrapper: "md:col-span-12",
              imgClass: "w-full h-[50vh] md:h-[80vh]",
            },
            {
              wrapper: "md:col-span-5",
              imgClass: "w-full aspect-[4/5] md:aspect-[3/4]",
            },
            {
              wrapper: "md:col-span-7 md:mt-40",
              imgClass: "w-full aspect-video md:aspect-[4/3]",
            },
            {
              wrapper: "md:col-span-10 md:col-start-2",
              imgClass: "w-full h-[50vh] md:h-[70vh]",
            },
          ];

          projects.forEach((project, index) => {
            const style = layouts[index % layouts.length];
            const cardHTML = `
            <div class="${style.wrapper} gs-reveal">
              <a href="project-detail.html?id=${project.id}" class="group block cursor-pointer">
                <div class="${style.imgClass} overflow-hidden bg-gray-200 rounded-sm gs-image">
                  <img
                    src="${project.cover_image_url}"
                    class="w-full h-full object-cover transition-transform duration-[1.2s] ease-expo group-hover:scale-105"
                    alt="${project.title}"
                  />
                </div>
                <div class="flex justify-between items-center mt-6">
                  <h3 class="text-2xl font-medium tracking-tight group-hover:opacity-70 transition-opacity">
                    ${project.title}
                  </h3>
                  <span class="text-sm font-medium text-primary-dark/60">${project.year}</span>
                </div>
              </a>
            </div>
            `;
            grid.innerHTML += cardHTML;
          });

          // Re-initialize GSAP for the newly injected elements
          setTimeout(() => {
            const newRevealElements = gsap.utils.toArray(".gs-reveal");
            newRevealElements.forEach((elem) => {
              if (!elem.classList.contains("anim-initialized")) {
                elem.classList.add("anim-initialized");
                gsap.fromTo(
                  elem,
                  { autoAlpha: 0, y: 50 },
                  {
                    duration: 1.2,
                    autoAlpha: 1,
                    y: 0,
                    ease: "power3.out",
                    scrollTrigger: {
                      trigger: elem,
                      start: "top 85%",
                      toggleActions: "play none none reverse",
                    },
                  },
                );
              }
            });
            const newImages = gsap.utils.toArray(".gs-image img");
            newImages.forEach((img) => {
              if (!img.classList.contains("anim-initialized")) {
                img.classList.add("anim-initialized");
                gsap.to(img, {
                  yPercent: 15,
                  ease: "none",
                  scrollTrigger: {
                    trigger: img.parentElement,
                    start: "top bottom",
                    end: "bottom top",
                    scrub: true,
                  },
                });
              }
            });
            ScrollTrigger.refresh();
          }, 100);
        }

        // Fire the static function to load the grid!
        loadProjects();
      });
    </script>
  </body>
</html>
